# Display name of the project (shown in the interactive UI)
name: Dart

# Unique identifier — also used as the folder name under projects/
slug: dart

# URL of the source site to crawl and translate
url: "https://dart.dev"

# Deployed URLs for each translated language (used to generate hreflang tags and rewrite links)
targetUrls:
  es: "https://dart.esdocu.com"

# Site type: "generic" (Hugo, Astro, VitePress, Jekyll…) or "nextjs" (Next.js app with React hydration)
siteType: generic

crawl:
  # Milliseconds to wait between page requests (reduces server load)
  delayMs: 1500
  # Additional random delay per request (helps avoid bot detection)
  delayJitterMs: 500
  # Maximum number of pages to crawl (set to a high value to crawl everything)
  maxPages: 50000
  # Blocklist mode: skip URLs whose pathname contains any of these strings (patterns starting with ^ or ending with $ are evaluated as regex)
  # Use this to exclude sections like /blog/, /api/, /admin/, other language prefixes, etc.
  ignorePatterns: ["^/tools/diagnostics/", "^/tools/linter-rules/"]
  # Strip trailing slashes from crawled URLs for consistent deduplication
  normalizeTrailingSlash: true
  # Remove query parameters from crawled URLs (keeps ?lang=, ?v=... out of the page list)
  stripQueryParams: true
  # Extra delay (ms) after page hydration — increase for JS-heavy sites like Next.js
  postHydrationDelayMs: 800

paths:
  # Where processed + pre-personalized HTML files are saved (Stage 1 output)
  original: /Users/fabian/Documents/CodeProjects/github.com/esdocu/dart/original
  # Where raw Playwright HTML is saved (used for reprocessing without re-crawling)
  raw: /Users/fabian/Documents/CodeProjects/github.com/esdocu/dart/raw
  # Where temporary metadata and cache files are saved
  tmp: /Users/fabian/Documents/CodeProjects/github.com/esdocu/dart/tmp
  # Output directories per target language
  translations:
      es: /Users/fabian/Documents/CodeProjects/github.com/esdocu/dart/es

translation:
  # Translation provider: "ollama" (local, no API key) or "gemini" (Google Gemini API)
  provider: ollama
  # Base URL of the local Ollama server (only used when provider is "ollama")
  ollamaUrl: "http://localhost:11434"
  # Model name or list of models for multi-model fallback (tried in order on failure)
  # Comment out any model to temporarily disable it
  model: 
    - llama3.1
    - gemma4
  # Language code of the source content (ISO 639-1, e.g. "en", "es", "fr")
  sourceLanguage: en
  # Target languages to translate into (must match keys in targetUrls and paths.translations)
  targetLanguages: ["es"]
  # Number of HTML fragments sent to the model in a single API call
  batchSize: 20
  # Maximum token count per HTML fragment before it is split into smaller pieces
  maxFragmentTokens: 2000
  # Retries per model before moving to the next one in the list (default: 3)
  maxRetries: 3
  # Cache entry lifetime in seconds. -1 = no expiry | 0 = cache disabled | N = TTL in seconds
  cacheExpiry: -1
  # Optional context injected into the translation prompt (describe the site for better accuracy)
  context: "Official documentation for the Dart programming language. Covers core language concepts (syntax, variables, operators, control flow, types, functions, classes, generics), asynchronous programming (Futures, Streams), sound null safety, compiler technologies (AOT, JIT), package manager (pub), command-line tools (dart analyze, dart format, dart run, dart test), and integration with the Flutter framework."
  # Terms that must never be translated (brand names, technical terms, trademarks, etc.)
  preserveTerms:
    - Dart
    - Flutter
    - SDK
    - API
    - CLI
    - VM
    - Dart VM
    - pub
    - pubspec
    - pubspec.yaml
    - pub.dev
    - DevTools
    - Hot Reload
    - Hot Restart
    - AOT
    - JIT
    - HTML
    - CSS
    - JavaScript
    - TypeScript
    - WebAssembly
    - Wasm
    - Futures
    - Streams
    - Future
    - Stream
    - async
    - await
    - Null Safety
    - sound null safety
    - linter
    - analyzer
    - dart analyzer
    - dart compile
    - dart doc
    - dart format
    - dart run
    - dart test
  # Set to true to translate comment spans inside <pre><code> blocks (default: true)
  translateCodeBlockComments: true

personalization:
  # Rules applied at the end of Stage 1, BEFORE translation
  # Use to remove analytics, tracking scripts, cookie banners, ads, etc.
  preTranslation:
    # The cookie notice relies on Dart WASM component hydration to register its
    # click handler. If the Dart component decides the notice is already dismissed
    # (because localStorage["cookie-consent"] was set in a prior session), it skips
    # hydration and the static HTML's class="show" becomes unresponsive.
    # This script acts as a standalone fallback: it uses the same localStorage key
    # Dart uses, hides the notice on page load if already accepted, and registers
    # its own click handler so the button always works regardless of Dart state.
    - type: inject_html
      position: head_end
      html: |
        <script>
        (function() {
          var CONSENT_KEY = 'cookie-consent';
          var NOTICE_ID = 'cookie-notice';
          var DISMISS_DAYS = 180;
          function isDismissed() {
            try {
              var v = window.localStorage.getItem(CONSENT_KEY);
              if (!v) return false;
              var ts = Number(v);
              if (!ts) return false;
              return (Date.now() - ts) < DISMISS_DAYS * 86400 * 1000;
            } catch (e) { return false; }
          }
          function dismiss(el) {
            try { window.localStorage.setItem(CONSENT_KEY, String(Date.now())); } catch (e) {}
            el.classList.remove('show');
          }
          function init() {
            var notice = document.getElementById(NOTICE_ID);
            if (!notice) return;
            if (isDismissed()) { notice.classList.remove('show'); return; }
            var btn = notice.querySelector('button.filled-button');
            if (btn) btn.addEventListener('click', function() { dismiss(notice); });
          }
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
          } else {
            init();
          }
        })();
        </script>
    - type: remove_element
      selector: 'script[src*="googletagmanager.com"]'
      description: Remove Google Tag Manager external scripts
    - type: remove_element
      selector: 'script[src*="google-analytics.com"]'
      description: Remove Google Analytics external scripts
    - type: remove_element
      selector: 'script:contains("window.dataLayer")'
      description: Remove dataLayer inline script
    - type: remove_element
      selector: 'script:contains("gtm.js")'
      description: Remove GTM inline script
    - type: remove_element
      selector: 'script:contains("GoogleAnalyticsObject")'
      description: Remove UA inline script
    - type: remove_element
      selector: 'noscript:contains("googletagmanager.com")'
      description: Remove GTM noscript fallback iframe
  # Rules applied AFTER translation (applied automatically during translation/build for both AI and manual modes)
  # Use to inject banners, replace copyright text, rename page titles, etc.
  # Add "languages: [es, fr]" to a rule to restrict it to specific language outputs.
  postTranslation:
    - type: replace_text
      selector: "head > title"
      search: Dart
      replace: Dart en Español
      languages: ["es"]
      description: Rename page titles for the Spanish translation

# How to handle static assets (CSS, JS, images, fonts): "copy" (default) or "symlink"
copyAssetsMode: copy

# Optional: regex rules to rewrite URL pathnames at output time (output files, links, sitemap, hreflang).
# Useful when crawling a language-prefixed site (e.g. /en/…) but publishing without the prefix.
# Example: { pattern: "^/en/", replacement: "/" } → /en/getting-started/ becomes /getting-started/
pathRewrite: []

# Optional: map sibling-project domains to their translated equivalents (per language).
# Links in translated HTML pointing to a mapped domain are rewritten to the target language URL.
# Example: links to https://docs.astro.build become https://astro-docs.esdocu.com in Spanish output.
domainMap: {}
